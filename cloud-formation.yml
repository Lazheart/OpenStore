AWSTemplateFormatVersion: "2010-09-09"
Description: "OpenStore: 2 App Servers detrás de ALB, 1 DB Server y bucket S3 (reutiliza AMI/parametros existentes)"

Parameters:
  InstanceName:
    Type: String
    Default: "MV-OpenShop"
    Description: "Maquina Virtual 1"
  AMI:
    Type: String
    Default: "ami-08d434e92c0cfa0c0"
    Description: "ID de AMI"
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: "vockey"
    Description: "KeyPair para acceso SSH (opcional)"
  InstanceType:
    Type: String
    Default: "t3.micro"
    AllowedValues:
      - "t2.micro"
      - "t3.micro"
      - "t3.small"
      - "t3.medium"
    Description: "Tipo de instancia para App/DB"
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC donde desplegar los recursos"
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: "Subnet pública 1 (para ALB y EC2 con IP pública)"
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: "Subnet pública 2 (para ALB y EC2 con IP pública)"

Resources:
  LoadBalancerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "ALB: permitir HTTP desde internet"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"

  AppServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "App Servers: HTTP solo desde ALB, SSH opcional"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"

  DbServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "DB Server: PostgreSQL/MySQL/Mongo solo desde App Servers"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppServerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppServerSecurityGroup
        - IpProtocol: "tcp"
          FromPort: 27017
          ToPort: 27017
          SourceSecurityGroupId: !Ref AppServerSecurityGroup

  ApplicationLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub "openstore-alb-${AWS::StackName}"
      Scheme: "internet-facing"
      Type: "application"
      IpAddressType: "ipv4"
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  AppTargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      Name: !Sub "openstore-tg-${AWS::StackName}"
      VpcId: !Ref VpcId
      Protocol: "HTTP"
      Port: 80
      TargetType: "instance"
      HealthCheckProtocol: "HTTP"
      HealthCheckPort: "traffic-port"
      HealthCheckPath: "/"
      Matcher:
        HttpCode: "200-399"
      Targets:
        - Id: !Ref AppServer1
          Port: 80
        - Id: !Ref AppServer2
          Port: 80

  HttpListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: "HTTP"
      DefaultActions:
        - Type: "forward"
          TargetGroupArn: !Ref AppTargetGroup

  AppServer1:
    Type: "AWS::EC2::Instance"
    DependsOn: DbServer
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-App-1"
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref AppServerSecurityGroup
      SubnetId: !Ref PublicSubnet1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt update -y
          apt install -y docker.io git netcat-openbsd
          systemctl start docker
          systemctl enable docker
          sudo usermod -aG docker ubuntu

          cd /home/ubuntu
          if [ ! -d "OpenStore" ]; then
            git clone https://github.com/Lazheart/OpenStore
          else
            cd OpenStore && git pull || true
            cd ..
          fi
          #Eliminar carpeta frontend si existe
          if [ -d "/home/ubuntu/OpenStore/frontend" ]; then
            rm -rf /home/ubuntu/OpenStore/frontend
          fi
          cd OpenStore/backend/

          cp -f .env.example .env

          sed -i "s/^POSTGRES_HOST=.*/POSTGRES_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s/^MYSQL_HOST=.*/MYSQL_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s/^MONGO_HOST=.*/MONGO_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s|^DATABASE_URL=.*|DATABASE_URL=jdbc:postgresql://${DbServer.PrivateIp}:5432/openstoredb|" .env
          sed -i "s|^SHOP_DATABASE_URL=.*|SHOP_DATABASE_URL=mysql://shopuser:shoppass@${DbServer.PrivateIp}:3306/shopdb|" .env
          sed -i "s|^MONGO_URI=.*|MONGO_URI=mongodb://${DbServer.PrivateIp}:27017/productdb|" .env

          until nc -z ${DbServer.PrivateIp} 5432; do echo "Esperando PostgreSQL..."; sleep 5; done
          until nc -z ${DbServer.PrivateIp} 3306; do echo "Esperando MySQL..."; sleep 5; done
          until nc -z ${DbServer.PrivateIp} 27017; do echo "Esperando Mongo..."; sleep 5; done

          docker compose up -d user-service shop-service product-service

  AppServer2:
    Type: "AWS::EC2::Instance"
    DependsOn: DbServer
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-App-2"
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref AppServerSecurityGroup
      SubnetId: !Ref PublicSubnet2
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt update -y
          apt install -y docker.io git netcat-openbsd
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ubuntu

          cd /home/ubuntu
          if [ ! -d "OpenStore" ]; then
            git clone https://github.com/Lazheart/OpenStore
          else
            cd OpenStore && git pull || true
            cd ..
          fi
          #Eliminar carpeta frontend si existe
          if [ -d "/home/ubuntu/OpenStore/frontend" ]; then
            rm -rf /home/ubuntu/OpenStore/frontend
          fi
          cd OpenStore/backend/

          cp -f .env.example .env

          sed -i "s/^POSTGRES_HOST=.*/POSTGRES_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s/^MYSQL_HOST=.*/MYSQL_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s/^MONGO_HOST=.*/MONGO_HOST=${DbServer.PrivateIp}/" .env
          sed -i "s|^DATABASE_URL=.*|DATABASE_URL=jdbc:postgresql://${DbServer.PrivateIp}:5432/openstoredb|" .env
          sed -i "s|^SHOP_DATABASE_URL=.*|SHOP_DATABASE_URL=mysql://shopuser:shoppass@${DbServer.PrivateIp}:3306/shopdb|" .env
          sed -i "s|^MONGO_URI=.*|MONGO_URI=mongodb://${DbServer.PrivateIp}:27017/productdb|" .env

          until nc -z ${DbServer.PrivateIp} 5432; do echo "Esperando PostgreSQL..."; sleep 5; done
          until nc -z ${DbServer.PrivateIp} 3306; do echo "Esperando MySQL..."; sleep 5; done
          until nc -z ${DbServer.PrivateIp} 27017; do echo "Esperando Mongo..."; sleep 5; done

          docker compose up -d user-service shop-service product-service

  DbServer:
    Type: "AWS::EC2::Instance"
    Properties:
      Tags:
        - Key: "Name"
          Value: !Sub "${InstanceName}-DB"
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: "LabInstanceProfile"
      SecurityGroupIds:
        - !Ref DbServerSecurityGroup
      SubnetId: !Ref PublicSubnet1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: "30"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt update -y
          apt install -y docker.io git
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ubuntu

          #Eliminar carpeta frontend si existe
          if [ -d "/home/ubuntu/OpenStore/frontend" ]; then
            rm -rf /home/ubuntu/OpenStore/frontend
          fi

          cd /home/ubuntu
          if [ ! -d "OpenStore" ]; then
            git clone https://github.com/Lazheart/OpenStore
          else
            cd OpenStore && git pull || true
            cd ..
          fi

          cd OpenStore/backend/
          cp -f .env.example .env

          docker compose up -d postgres mysql mongo

  ImagesBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "openstore-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

Outputs:
  LoadBalancerDNS:
    Description: "DNS del Application Load Balancer"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  AppServer1PublicIP:
    Description: "IP publica del App Server 1"
    Value: !GetAtt AppServer1.PublicIp
  AppServer2PublicIP:
    Description: "IP publica del App Server 2"
    Value: !GetAtt AppServer2.PublicIp
  DbServerPublicIP:
    Description: "IP publica del DB Server"
    Value: !GetAtt DbServer.PublicIp
  ImagesBucketName:
    Description: "Nombre del bucket S3"
    Value: !Ref ImagesBucket
