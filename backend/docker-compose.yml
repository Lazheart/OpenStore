services:
  user-service:
    build:
      context: ./user-service
    container_name: openstore-user-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SERVER_PORT: ${APP_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-openstoredb}
      DB_USERNAME: ${POSTGRES_USER:-openstoreuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openstorepass}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${APP_PORT:-8080}:8080"

  shop-service:
    build:
      context: ./shop-service
    container_name: openstore-shop-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SHOP_SERVICE_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      SHOP_DATABASE_URL: mysql://${MYSQL_USER:-shopuser}:${MYSQL_PASSWORD:-shoppass}@${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-shopdb}
    ports:
      - "${SHOP_APP_PORT:-8081}:3000"
    command: sh -c "pnpm exec prisma migrate deploy && node dist/index.js"

  product-service:
    build:
      context: ./product-service
    container_name: openstore-product-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      BUCKET_NAME: ${BUCKET_NAME}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8080}
      SHOP_SERVICE_URL: ${SHOP_SERVICE_URL:-http://shop-service:3000}
      MONGO_URI: mongodb://${MONGO_HOST:-mongo}:27017/productdb
    ports:
      - "80:8000"
      - "${PRODUCT_APP_PORT:-8082}:8000"

