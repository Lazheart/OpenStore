<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>OpenStore - API Documentation</title>
    <style>
      body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; padding:24px}
      h1{margin-bottom:8px}
      .card{border:1px solid #e6e6e6;padding:16px;border-radius:8px;margin:8px 0}
      .btn{display:inline-block;padding:8px 12px;background:#0b69ff;color:#fff;border-radius:6px;text-decoration:none}
    </style>
  </head>
  <body>
    <h1>Documentación de APIs</h1>
    <p>Selecciona el servicio para abrir su documentación (Swagger/OpenAPI).</p>
    {% for s in services %}
    <div class="card">
      <strong>{{ s.name }}</strong>
      <div style="margin-top:8px">
        <a class="btn" href="{{ s.url }}" target="_blank" rel="noreferrer">Abrir documentación</a>
        <span style="margin-left:12px;color:#666">{{ s.url }}</span>
      </div>
    </div>
    {% endfor %}
  </body>
</html>
