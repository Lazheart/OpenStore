services:
  postgres:
    image: postgres:16
    container_name: openstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openstoredb}
      POSTGRES_USER: ${POSTGRES_USER:-openstoreuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openstorepass}
    ports:
      - "${POSTGRES_PORT:-4050}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openstoreuser} -d ${POSTGRES_DB:-openstoredb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: openstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopdb}
      MYSQL_USER: ${MYSQL_USER:-shopuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shoppass}
    ports:
      - "${MYSQL_PORT:-4060}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-shopuser} -p${MYSQL_PASSWORD:-shoppass} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  mongo:
    image: mongo:7
    container_name: openstore-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-4070}:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 15
