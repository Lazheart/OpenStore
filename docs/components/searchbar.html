<section class="search-panel" aria-label="Buscador de documentación">
	<label class="search-label" for="docs-search">Buscar documentación</label>
	<form class="search-form" data-doc-search-form>
		<input
			id="docs-search"
			type="search"
			placeholder="API, frontend, deployment, AWS..."

	<div class="search-results" data-doc-search-results aria-live="polite"></div>
</section>
